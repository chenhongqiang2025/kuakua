<!-- Apple Touch Icon: deeper warm tones, no rounded corners (iOS adds them). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="KUAKUA">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#E8D4C8"/>
      <stop offset="55%" stop-color="#B5837A"/>
      <stop offset="100%" stop-color="#8A5D58"/>
    </radialGradient>
  </defs>
  <rect width="180" height="180" fill="url(#bg)"/>
  <text
    x="90" y="125"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="112" font-style="italic" font-weight="400"
    fill="#FAF6F0" text-anchor="middle"
    letter-spacing="-4"
  >K</text>
</svg>
