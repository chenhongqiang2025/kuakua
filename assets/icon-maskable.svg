<!-- Maskable icon: artwork stays inside the safe zone (40% radius from center)
     so Android/Chromebook can crop into any shape (circle, squircle, etc.) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="KUAKUA">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#E8D4C8"/>
      <stop offset="55%" stop-color="#B5837A"/>
      <stop offset="100%" stop-color="#8A5D58"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <text
    x="256" y="320"
    font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif"
    font-size="220" font-style="italic" font-weight="400"
    fill="#FAF6F0" text-anchor="middle"
    letter-spacing="-8"
  >K</text>
</svg>
